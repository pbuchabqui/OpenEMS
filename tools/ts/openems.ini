; -------------------------------------------------------------------------
; OpenEMS — definição de projeto TunerStudio
;
; Transporte: UART 115200 8N1 (USART1: PA9=TX, PA10=RX) via adaptador USB-UART
;             (ou USB CDC nativo, mesmo stream de protocolo).
; Protocolo:  envelope TS msEnvelope_1.0 (CRC32) sobre os comandos MS-style
;             Q/S/F/A/r/w/b. O firmware auto-detecta envelope vs legacy por
;             frame (1º byte <0x20 → envelope).
;
; Sintaxe das diretivas de página confirmada contra dois projetos reais
; instalados nesta máquina (Speeduino 202501.6 e rusEFI): em modo
; msEnvelope_1.0 o TunerStudio SEMPRE prefixa o identificador de página com
; o byte $tsCanId (mesmo em transporte serial puro, sem CAN) e exige que
; pageReadCommand/pageValueWrite/pageChunkWrite/burnCommand sejam listas
; com uma entrada por página (não uma string escalar única) — sem isto o
; TS falha a conexão com timeouts de tamanho absurdo (visto na prática:
; "Expected bytes:20339, bytes read:9" ao tentar ler o primeiro comando).
; ochGetCommand também precisa dos placeholders %2o%2c; aqui reaproveita-se
; o comando 'r' já testado sobre a página 3 (realtime, 66 bytes) em vez de
; inventar um verbo novo no firmware.
;
; Fonte da verdade dos offsets: src/app/ui_protocol.cpp (sync_page_from_table)
;             e tools/openems_dash/protocol.py (PAGE*_FIELDS).
;
; Mapeamento página ini → página firmware:
;   1→0 (config/dirigibilidade)  2→1 (VE)      3→2 (spark)   4→4 (lambda)
;   5→5 (correções 1D)           6→6 (X-τ/AE)  7→7 (dwell)   8→8 (pedal)
;   9→9 (boost)                 10→11 (eixos das tabelas 20×20)
; -------------------------------------------------------------------------

[MegaTune]
   MTversion      = 2.25
   signature      = "OpenEMS_v1.3"
   queryCommand   = "Q"
   versionInfo    = "S"

[TunerStudio]
   iniSpecVersion = 3.64

[Constants]
   endianness           = little
   nPages               = 10
   messageEnvelopeFormat = msEnvelope_1.0
   pageIdentifier       = "\$tsCanId\x00", "\$tsCanId\x01", "\$tsCanId\x02", "\$tsCanId\x04", "\$tsCanId\x05", "\$tsCanId\x06", "\$tsCanId\x07", "\$tsCanId\x08", "\$tsCanId\x09", "\$tsCanId\x0B"
   pageSize             = 512, 400, 400, 800, 256, 80, 32, 80, 112, 80
   pageReadCommand      = "r%2i%2o%2c", "r%2i%2o%2c", "r%2i%2o%2c", "r%2i%2o%2c", "r%2i%2o%2c", "r%2i%2o%2c", "r%2i%2o%2c", "r%2i%2o%2c", "r%2i%2o%2c", "r%2i%2o%2c"
   pageChunkWrite       = "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v"
   pageValueWrite       = "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v", "w%2i%2o%2c%v"
   burnCommand          = "b%2i", "b%2i", "b%2i", "b%2i", "b%2i", "b%2i", "b%2i", "b%2i", "b%2i", "b%2i"
   ochGetCommand        = "r\$tsCanId\x03%2o%2c"
   ochBlockSize         = 66
   blockingFactor       = 256
   tableBlockingFactor  = 256
   interWriteDelay      = 10
   pageActivationDelay  = 10
   blockReadTimeout     = 2000
   delayAfterPortOpen   = 500

   ; ── Página 1 (fw 0): engine config + dirigibilidade ────────────────────
   page = 1
      ivcAbdcDeg          = scalar, U08,   0, "deg",    1.0, 0, 0, 120, 0
      displacement        = scalar, U16,   2, "cc",     1.0, 0, 100, 8000, 0
      injectorFlow        = scalar, U16,   4, "cc/min", 1.0, 0, 50, 5000, 0
      stoichAfr           = scalar, U16,   6, "AFR",    0.01, 0, 6.0, 20.0, 2
      mapRef              = scalar, U16,   8, "bar",    0.01, 0, 0.5, 4.0, 2
      triggerOffset       = scalar, U16,  10, "deg",    1.0, 0, 0, 719, 0
      eoiLeadDeg          = scalar, U16,  12, "deg",    1.0, 0, 0, 719, 0
      app1RawMin          = scalar, U16,  16, "ADC",    1.0, 0, 0, 4095, 0
      app1RawMax          = scalar, U16,  18, "ADC",    1.0, 0, 0, 4095, 0
      app2RawMin          = scalar, U16,  20, "ADC",    1.0, 0, 0, 4095, 0
      app2RawMax          = scalar, U16,  22, "ADC",    1.0, 0, 0, 4095, 0
      etbTps1RawMin       = scalar, U16,  24, "ADC",    1.0, 0, 0, 4095, 0
      etbTps1RawMax       = scalar, U16,  26, "ADC",    1.0, 0, 0, 4095, 0
      etbTps2RawMin       = scalar, U16,  28, "ADC",    1.0, 0, 0, 4095, 0
      etbTps2RawMax       = scalar, U16,  30, "ADC",    1.0, 0, 0, 4095, 0
      appMaxDelta         = scalar, U16,  32, "%",      0.1, 0, 0, 50, 1
      etbMaxDelta         = scalar, U16,  34, "%",      0.1, 0, 0, 50, 1
      etbLimpMaxOpen      = scalar, U16,  36, "%",      0.1, 0, 0, 100, 1
      etbMaxRate          = scalar, U16,  38, "%/s",    1.0, 0, 0, 2000, 0
      etbIdleOpen         = scalar, U16,  40, "%",      0.1, 0, 0, 100, 1
      etbCalValid         = scalar, U08,  42, "",       1.0, 0, 0, 1, 0
      etbHarnessPresent   = scalar, U08,  43, "",       1.0, 0, 0, 1, 0
      etbKp               = scalar, U16,  44, "",       0.1, 0, 0, 100, 1
      etbKi               = scalar, U16,  46, "",       0.1, 0, 0, 100, 1
      etbKd               = scalar, U16,  48, "",       0.1, 0, 0, 100, 1
      cylFuelTrim1        = scalar, S08,  56, "%",      1.0, 0, -25, 25, 0
      cylFuelTrim2        = scalar, S08,  57, "%",      1.0, 0, -25, 25, 0
      cylFuelTrim3        = scalar, S08,  58, "%",      1.0, 0, -25, 25, 0
      cylFuelTrim4        = scalar, S08,  59, "%",      1.0, 0, -25, 25, 0
      cylIgnTrim1         = scalar, S08,  60, "deg",    1.0, 0, -10, 10, 0
      cylIgnTrim2         = scalar, S08,  61, "deg",    1.0, 0, -10, 10, 0
      cylIgnTrim3         = scalar, S08,  62, "deg",    1.0, 0, -10, 10, 0
      cylIgnTrim4         = scalar, S08,  63, "deg",    1.0, 0, -10, 10, 0
      cmpWindowOpen       = scalar, U08,  64, "tooth",  1.0, 0, 0, 57, 0
      cmpWindowClose      = scalar, U08,  65, "tooth",  1.0, 0, 0, 57, 0
      antijerkTpsdot      = scalar, U16,  66, "%/s",    0.1, 0, 0, 500, 1
      antijerkRetard      = scalar, S16,  68, "deg",    1.0, 0, 0, 20, 0
      antijerkDecay       = scalar, U08,  70, "cycles", 1.0, 0, 0, 50, 0
      revLimitRpm         = scalar, U32,  72, "RPM",    0.1, 0, 1000, 12000, 0
      revLimitSoftWindow  = scalar, U32,  76, "RPM",    0.1, 0, 0, 2000, 0
      revLimitSparkWindow = scalar, U32,  80, "RPM",    0.1, 0, 0, 2000, 0
      revLimitMaxRetard   = scalar, S16,  84, "deg",    1.0, 0, 0, 30, 0
      ltftAddPwThreshold  = scalar, U16,  86, "ms",     0.001, 0, 0, 10, 3
      decelCutTps         = scalar, U16,  88, "%",      0.1, 0, 0, 20, 1
      decelCutEntryRpm    = scalar, U32,  90, "RPM",    0.1, 0, 0, 8000, 0
      decelCutExitRpm     = scalar, U32,  94, "RPM",    0.1, 0, 0, 8000, 0
      decelCutMinClt      = scalar, S16,  98, "C",      0.1, 0, -40, 150, 1
      etbIdleRpmTarget    = scalar, U16, 100, "RPM",    1.0, 0, 400, 2000, 0
      etbIdleMinOpen      = scalar, U16, 102, "%",      0.1, 0, 0, 20, 1
      etbIdleMaxOpen      = scalar, U16, 104, "%",      0.1, 0, 0, 30, 1
      iacCltAxis          = array,  S16, 106, [8], "C", 0.1, 0, -40, 150, 1
      iacIdleTargetRpm    = array,  U16, 122, [8], "RPM", 0.1, 0, 400, 2500, 0
      wbo2CanId           = scalar, U16, 138, "ID",     1.0, 0, 0, 2047, 0
      stftKp              = scalar, U16, 140, "x0.01",  1.0, 0, 0, 100, 0
      stftKi              = scalar, U16, 142, "x0.001", 1.0, 0, 0, 100, 0
      stftClamp           = scalar, U16, 144, "%",      0.1, 0, 0, 30, 1
      xtauXMin            = scalar, U16, 146, "Q8",     1.0, 0, 0, 255, 0
      xtauXMax            = scalar, U16, 148, "Q8",     1.0, 0, 0, 255, 0
      xtauTauMin          = scalar, U16, 150, "cycles", 1.0, 0, 1, 255, 0
      xtauTauMax          = scalar, U16, 152, "cycles", 1.0, 0, 1, 255, 0
      ewgKp               = scalar, U16, 154, "x0.1",   1.0, 0, 0, 500, 0
      ewgKi               = scalar, U16, 156, "x0.1",   1.0, 0, 0, 500, 0
      ewgKd               = scalar, U16, 158, "x0.1",   1.0, 0, 0, 500, 0
      ewgPosMinRaw        = scalar, U16, 160, "ADC",    1.0, 0, 0, 4095, 0
      ewgPosMaxRaw        = scalar, U16, 162, "ADC",    1.0, 0, 0, 4095, 0
      eoiIdleDeg          = scalar, U16, 164, "deg",    1.0, 0, 0, 719, 0
      eoiBlendRpmLo       = scalar, U16, 166, "RPM",    1.0, 0, 0, 12000, 0
      eoiBlendRpmHi       = scalar, U16, 168, "RPM",    1.0, 0, 0, 12000, 0

   ; ── Página 2 (fw 1): tabela VE 20×20 ───────────────────────────────────
   page = 2
      veTable             = array,  U08,   0, [20x20], "%", 1.0, 0, 0, 255, 0

   ; ── Página 3 (fw 2): tabela de avanço 20×20 ────────────────────────────
   page = 3
      advTable            = array,  S08,   0, [20x20], "deg", 1.0, 0, -20, 60, 0

   ; ── Página 4 (fw 4): tabela lambda alvo 20×20 ──────────────────────────
   page = 4
      lambdaTable         = array,  S16,   0, [20x20], "lambda", 0.001, 0, 0.60, 1.30, 3

   ; ── Página 5 (fw 5): correções 1D + idle spark ─────────────────────────
   page = 5
      cltCorrAxis         = array,  S16,   0, [8], "C",     0.1, 0, -40, 150, 1
      cltCorrMult         = array,  U16,  16, [8], "x256",  1.0, 0, 0, 1024, 0
      iatCorrAxis         = array,  S16,  32, [8], "C",     0.1, 0, -40, 150, 1
      iatCorrMult         = array,  U16,  48, [8], "x256",  1.0, 0, 0, 1024, 0
      warmupCorrAxis      = array,  S16,  64, [8], "C",     0.1, 0, -40, 150, 1
      warmupCorrMult      = array,  U16,  80, [8], "x256",  1.0, 0, 0, 1024, 0
      vbattCorrAxis       = array,  U16,  96, [8], "V",     0.001, 0, 6, 18, 2
      injDeadTime         = array,  U16, 112, [8], "ms",    0.001, 0, 0, 5, 3
      aeCltCorrAxis       = array,  S16, 128, [8], "C",     0.1, 0, -40, 150, 1
      aeCltSens           = array,  U16, 144, [8], "x256",  1.0, 0, 0, 1024, 0
      dwellVbattAxis      = array,  U16, 160, [8], "V",     0.001, 0, 6, 18, 2
      dwellMs             = array,  U16, 176, [8], "ms",    0.1, 0, 0, 10, 1
      aeTpsdotThreshold   = scalar, U16, 234, "%/s",        0.1, 0, 0, 500, 1
      aeTaperCycles       = scalar, U16, 236, "cycles",     1.0, 0, 0, 100, 0
      aeMaxPw             = scalar, U16, 238, "ms",         0.001, 0, 0, 20, 3
      idleSparkTpsMax     = scalar, U16, 240, "%",          0.1, 0, 0, 20, 1
      idleSparkMapMax     = scalar, U16, 242, "bar",        0.01, 0, 0, 1.5, 2
      idleSparkRpmMin     = scalar, U16, 244, "RPM",        0.1, 0, 0, 2000, 0
      idleSparkWindow     = scalar, U16, 246, "RPM",        0.1, 0, 0, 1000, 0
      idleSparkDeadband   = scalar, U16, 248, "RPM",        0.1, 0, 0, 500, 0
      idleSparkRpmPerDeg  = scalar, U16, 250, "RPM/deg",    0.1, 0, 0, 200, 1
      idleSparkRetardLim  = scalar, S16, 252, "deg",        1.0, 0, -30, 0, 0
      idleSparkAdvanceLim = scalar, S16, 254, "deg",        1.0, 0, 0, 30, 0

   ; ── Página 6 (fw 6): X-τ wall-wetting + AE rate + cranking ─────────────
   page = 6
      xtauCltAxis         = array,  S16,   0, [8], "C",      0.1, 0, -40, 150, 1
      xtauXFraction       = array,  U16,  16, [8], "Q8",     1.0, 0, 0, 255, 0
      xtauTauCycles       = array,  U16,  32, [8], "cycles", 1.0, 0, 1, 255, 0
      aeTpsdotAxis        = array,  U16,  48, [4], "%/s",    0.1, 0, 0, 1000, 1
      aePwAdder           = array,  U16,  56, [4], "ms",     0.001, 0, 0, 10, 3
      crankEnterRpm       = scalar, U16,  64, "RPM",         0.1, 0, 0, 1000, 0
      crankExitRpm        = scalar, U16,  66, "RPM",         0.1, 0, 0, 1500, 0
      crankSparkDeg       = scalar, S16,  68, "deg",         1.0, 0, -10, 30, 0
      crankMinPw          = scalar, U16,  70, "ms",          0.001, 0, 0, 30, 3
      crankPrimeTooth     = scalar, U16,  72, "tooth",       1.0, 0, 0, 57, 0
      crankPrimeMaxPw     = scalar, U16,  74, "ms",          0.001, 0, 0, 30, 3

   ; ── Página 7 (fw 7): correção de dwell por RPM ─────────────────────────
   page = 7
      dwellRpmAxis        = array,  U16,   0, [4], "RPM", 1.0, 0, 0, 12000, 0
      dwellRpmFactor      = array,  U16,   8, [4], "Q8",  1.0, 0, 0, 512, 0

   ; ── Página 8 (fw 8): mapas pedal→borboleta (4 modos × 10 pontos) ───────
   ; Eixo fixo: pedal 0,10,...,100%. Pontos em %×10 (0-1000).
   page = 8
      pedalMapEco         = array,  U16,   0, [10], "%", 0.1, 0, 0, 100, 1
      pedalMapNormal      = array,  U16,  20, [10], "%", 0.1, 0, 0, 100, 1
      pedalMapSport       = array,  U16,  40, [10], "%", 0.1, 0, 0, 100, 1
      pedalMapRain        = array,  U16,  60, [10], "%", 0.1, 0, 0, 100, 1

   ; ── Página 9 (fw 9): boost target por marcha (7 × 8 RPM) ───────────────
   page = 9
      boostTarget         = array,  U16,   0, [7x8], "bar", 0.001, 0, 0, 3.0, 3

   ; ── Página 10 (fw 11): eixos das tabelas 20×20 ─────────────────────────
   ; Firmware valida monotonicidade estrita; escrita não-monotónica é
   ; rejeitada (code 0x84) e os eixos anteriores permanecem.
   page = 10
      rpmBins             = array,  U16,   0, [20], "RPM", 1.0, 0, 100, 12000, 0
      loadBins            = array,  U16,  40, [20], "bar", 0.01, 0, 0.10, 4.00, 2

