[Menu]
   menuDialog = main
      menu = "&Tuning"
         subMenu = veTable1Tbl,     "VE Table"
         subMenu = sparkTableTbl,   "Ignition Advance Table"
         subMenu = lambdaTableTbl,  "Lambda Target Table"
         subMenu = std_separator
         subMenu = warmupCurve,     "Warmup Enrichment"
         subMenu = deadTimeCurve,   "Injector Dead Time"
         subMenu = dwellCurve,      "Dwell vs Battery"

      menu = "&Settings"
         subMenu = engineDlg,       "Engine Constants"
         subMenu = revLimitDlg,     "Rev Limiter / Decel Cut"
         subMenu = idleDlg,         "Idle"
         subMenu = closedLoopDlg,   "Closed Loop (STFT / X-tau)"
         subMenu = crankingDlg,     "Cranking / Accel Enrichment"
         subMenu = etbDlg,          "Electronic Throttle"

[UserDefined]
   dialog = engineDlg, "Engine Constants"
      field = "Displacement",            displacement
      field = "Injector flow",           injectorFlow
      field = "Stoich AFR",              stoichAfr
      field = "MAP reference",           mapRef
      field = "Trigger tooth0 offset",   triggerOffset
      field = "EOI lead (open-valve)",   eoiLeadDeg
      field = "EOI idle (closed-valve)", eoiIdleDeg
      field = "EOI blend RPM lo",        eoiBlendRpmLo
      field = "EOI blend RPM hi",        eoiBlendRpmHi
      field = "IVC angle",               ivcAbdcDeg
      field = "WBO2 CAN ID",             wbo2CanId

   dialog = revLimitDlg, "Rev Limiter / Decel Cut"
      field = "Rev limit",               revLimitRpm
      field = "Injection cut window",    revLimitSoftWindow
      field = "Spark retard window",     revLimitSparkWindow
      field = "Max spark retard",        revLimitMaxRetard
      field = "Decel cut TPS max",       decelCutTps
      field = "Decel cut entry RPM",     decelCutEntryRpm
      field = "Decel cut exit RPM",      decelCutExitRpm
      field = "Decel cut min CLT",       decelCutMinClt

   dialog = idleDlg, "Idle"
      field = "Idle RPM target",         etbIdleRpmTarget
      field = "Idle min opening",        etbIdleMinOpen
      field = "Idle max opening",        etbIdleMaxOpen
      field = "Idle spark TPS max",      idleSparkTpsMax
      field = "Idle spark MAP max",      idleSparkMapMax
      field = "Idle spark RPM/deg",      idleSparkRpmPerDeg
      field = "Idle spark retard limit", idleSparkRetardLim
      field = "Idle spark advance limit", idleSparkAdvanceLim

   dialog = closedLoopDlg, "Closed Loop"
      field = "STFT Kp (x0.01)",         stftKp
      field = "STFT Ki (x0.001)",        stftKi
      field = "STFT clamp",              stftClamp
      field = "X-tau X min (Q8)",        xtauXMin
      field = "X-tau X max (Q8)",        xtauXMax
      field = "X-tau tau min",           xtauTauMin
      field = "X-tau tau max",           xtauTauMax

   dialog = crankingDlg, "Cranking / AE"
      field = "Crank enter RPM",         crankEnterRpm
      field = "Crank exit RPM",          crankExitRpm
      field = "Crank spark",             crankSparkDeg
      field = "Crank min PW",            crankMinPw
      field = "Prime tooth",             crankPrimeTooth
      field = "Prime max PW",            crankPrimeMaxPw
      field = "AE TPSdot threshold",     aeTpsdotThreshold
      field = "AE taper cycles",         aeTaperCycles
      field = "AE max PW",               aeMaxPw

   dialog = etbDlg, "Electronic Throttle"
      field = "ETB Kp",                  etbKp
      field = "ETB Ki",                  etbKi
      field = "ETB Kd",                  etbKd
      field = "APP max delta",           appMaxDelta
      field = "ETB max delta",           etbMaxDelta
      field = "Limp max opening",        etbLimpMaxOpen
      field = "Max rate",                etbMaxRate

[CurveEditor]
   curve = warmupCurve, "Warmup Enrichment"
      columnLabel = "CLT", "Mult (x256)"
      xAxis  = -40, 150, 6
      yAxis  = 0, 768, 6
      xBins  = warmupCorrAxis, coolant
      yBins  = warmupCorrMult

   curve = deadTimeCurve, "Injector Dead Time"
      columnLabel = "Battery", "Dead time"
      xAxis  = 6, 18, 6
      yAxis  = 0, 3, 6
      xBins  = vbattCorrAxis
      yBins  = injDeadTime

   curve = dwellCurve, "Dwell vs Battery"
      columnLabel = "Battery", "Dwell"
      xAxis  = 6, 18, 6
      yAxis  = 0, 8, 6
      xBins  = dwellVbattAxis
      yBins  = dwellMs

   curve = iacCurve, "Idle Target vs CLT"
      columnLabel = "CLT", "Idle RPM"
      xAxis  = -40, 150, 6
      yAxis  = 400, 2000, 6
      xBins  = iacCltAxis, coolant
      yBins  = iacIdleTargetRpm

[TableEditor]
   table = veTable1Tbl, veTable1Map, "VE Table", 2
      xBins = rpmBins, rpm
      yBins = loadBins, map
      zBins = veTable
      gridHeight = 2.0
      upDownLabel = "RICHER", "LEANER"

   table = sparkTableTbl, sparkTableMap, "Ignition Advance", 3
      xBins = rpmBins, rpm
      yBins = loadBins, map
      zBins = advTable
      gridHeight = 3.0
      upDownLabel = "ADVANCE", "RETARD"

   table = lambdaTableTbl, lambdaTableMap, "Lambda Target", 4
      xBins = rpmBins, rpm
      yBins = loadBins, map
      zBins = lambdaTable
      gridHeight = 2.0
      upDownLabel = "RICHER", "LEANER"

;-------------------------------------------------------------------------------

[OutputChannels]
   ; ochGetCommand/ochBlockSize ficam só em [Constants] — bloco realtime de 66
   ; bytes (UiRealtimeData, ui_protocol.h), servido via 'r' page3 com %2o%2c.

   rpm          = scalar, U16,  0, "RPM",    1.0,   0
   map          = scalar, U08,  2, "bar",    0.01,  0
   tps          = scalar, U08,  3, "%",      1.0,   0
   coolant      = scalar, S08,  4, "C",      1.0, -40
   iat          = scalar, S08,  5, "C",      1.0, -40
   lambda       = scalar, U08,  6, "lambda", 0.004, 0
   pulseWidth   = scalar, U08,  7, "ms",     0.1,   0
   advance      = scalar, U08,  8, "deg",    1.0, -40
   veCell0      = scalar, U08,  9, "%",      1.0,   0
   stft         = scalar, S08, 10, "%",      1.0,   0

   statusBits   = scalar, U16, 12, "bits",   1.0,   0
   syncFull     = bits,   U16, 12, [0:0]
   phaseA       = bits,   U16, 12, [1:1]
   sensorFault  = bits,   U16, 12, [2:2]
   limpMode     = bits,   U16, 12, [3:3]
   etbLimp      = bits,   U16, 12, [4:4]
   xtauLearn    = bits,   U16, 12, [5:5]
   schedLate    = bits,   U16, 12, [6:6]
   schedDrop    = bits,   U16, 12, [7:7]
   schedClamp   = bits,   U16, 12, [8:8]
   wbo2Fault    = bits,   U16, 12, [9:9]
   tle8888Fault = bits,   U16, 12, [10:10]

