<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenEMS · Calibration</title>
<link rel="stylesheet" href="uplot.min.css">
<link rel="stylesheet" href="style.css?v=20260718aa">
</head>
<body>

<div id="shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div id="sb-brand">
      <div id="sb-logo">OPEN<span>EMS</span></div>
      <div id="sb-tag">CALIBRATION</div>
    </div>

    <nav id="sb-nav" aria-label="Surfaces">
      <div class="nav-group">
        <div class="nav-group-label">Tables</div>
        <button class="tab active" data-tab="grid-1" title="Fuel VE map (page 1)">
          <span class="tab-icon">▦</span><span class="tab-label">VE</span>
        </button>
        <button class="tab" data-tab="grid-2" title="Ignition advance (page 2)">
          <span class="tab-icon">⚡</span><span class="tab-label">Spark</span>
        </button>
        <button class="tab" data-tab="grid-4" title="Lambda target (page 4)">
          <span class="tab-icon">λ</span><span class="tab-label">Lambda</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Maps</div>
        <button class="tab" data-tab="pedal-map" title="Pedal → throttle maps">
          <span class="tab-icon">⌇</span><span class="tab-label">Pedal</span>
        </button>
        <button class="tab" data-tab="boost" title="Boost target by gear">
          <span class="tab-icon">⬆</span><span class="tab-label">Boost</span>
        </button>
        <button class="tab" data-tab="ltft-accum" title="LTFT learn → bake-in VE">
          <span class="tab-icon">◎</span><span class="tab-label">Learn</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Engine</div>
        <button class="tab" data-tab="params" title="Engine config &amp; corrections">
          <span class="tab-icon">≡</span><span class="tab-label">Params</span>
        </button>
        <button class="tab" data-tab="output-test" title="Output tests (engine stopped)">
          <span class="tab-icon">⚙</span><span class="tab-label">Outputs</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Diag</div>
        <button class="tab" data-tab="telemetry" title="Gauges, charts, CKP/CMP scope">
          <span class="tab-icon">◈</span><span class="tab-label">Telemetry</span>
        </button>
      </div>
    </nav>

    <div id="sb-bottom">
      <div class="sb-actions">
        <button id="benchBtn" type="button" title="Bench-mode: CLT/IAT/λ simulated + relaxed CKP (HIL)">BENCH</button>
        <button id="logBtn" type="button" title="Record datalog CSV">● LOG</button>
        <button id="logExportBtn" type="button" title="Export log for analysis">⇩ EXPORT</button>
        <button id="logMlgBtn" type="button" title="Download último log em MLG (MegaLogViewer)">⇩ MLG</button>
      </div>
    </div>
  </aside>

  <!-- ── Main column ─────────────────────────────────────────────────── -->
  <div id="main-wrap">

    <header id="statusbar">
      <div id="gauges" class="gauges" aria-label="Primary gauges"></div>
    </header>

    <main id="content">
      <section id="tab-telemetry" class="pane">
        <div id="gaugesExtra" class="gauges-extra"></div>
        <div id="scopeWrap">
          <div id="scopeHeader">
            <span id="scopeTitle">CKP / CMP SCOPE</span>
            <button id="scopeFreezeBtn" type="button">⏸ FREEZE</button>
          </div>
          <canvas id="scopeCanvas" height="155"></canvas>
          <div id="scopeInfo">—</div>
        </div>
        <div id="charts" class="charts"></div>
        <div id="diag" class="diag"></div>
      </section>

      <section id="tab-grid-1" class="pane grid-pane active" data-page="1"></section>
      <section id="tab-grid-2" class="pane grid-pane" data-page="2"></section>
      <section id="tab-grid-4" class="pane grid-pane" data-page="4"></section>

      <section id="tab-params" class="pane">
        <div id="paramsRoot"></div>
      </section>

      <section id="tab-boost" class="pane">
        <div id="boostRoot"></div>
      </section>

      <section id="tab-ltft-accum" class="pane">
        <div id="ltftAccumRoot"></div>
      </section>

      <section id="tab-pedal-map" class="pane">
        <div id="pedalMapRoot"></div>
      </section>

      <section id="tab-output-test" class="pane">
        <div id="outputTestRoot"></div>
      </section>
    </main>

    <footer id="ledbar" aria-label="Status chips bar">
      <div id="statusLeds" class="leds"></div>
      <div id="conn" class="conn-pill off" role="status">
        <span class="conn-dot"></span>
        <span class="conn-text">OFFLINE</span>
      </div>
    </footer>
  </div>

</div>

<footer id="toast" aria-live="polite"></footer>

<script src="uplot.min.js"></script>
<script src="js/helpers.js?v=20260718aa"></script>
<script src="app.js?v=20260718aa"></script>
</body>
</html>
