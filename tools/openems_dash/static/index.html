<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OpenEMS</title>
<link rel="stylesheet" href="uplot.min.css">
<link rel="stylesheet" href="style.css?v=20260712e">
</head>
<body>

<div id="shell">

  <!-- ── Coluna lateral esquerda ─────────────────────────────────────── -->
  <aside id="sidebar">
    <div id="sb-logo">OPEN<br>EMS</div>

    <nav id="sb-nav">
      <button class="tab active" data-tab="grid-1">
        <span class="tab-icon">▦</span>
        <span class="tab-label">VE</span>
      </button>
      <button class="tab" data-tab="grid-2">
        <span class="tab-icon">▦</span>
        <span class="tab-label">SPARK</span>
      </button>
      <button class="tab" data-tab="grid-4">
        <span class="tab-icon">▦</span>
        <span class="tab-label">LAMBDA</span>
      </button>
      <button class="tab" data-tab="pedal-map">
        <span class="tab-icon">⌇</span>
        <span class="tab-label">PEDAL MAP</span>
      </button>
      <button class="tab" data-tab="boost">
        <span class="tab-icon">⬆</span>
        <span class="tab-label">BOOST</span>
      </button>
      <button class="tab" data-tab="telemetry">
        <span class="tab-icon">◈</span>
        <span class="tab-label">TELEMETRY</span>
      </button>
      <button class="tab" data-tab="params">
        <span class="tab-icon">≡</span>
        <span class="tab-label">PARAMS</span>
      </button>
      <button class="tab" data-tab="output-test">
        <span class="tab-icon">⚡</span>
        <span class="tab-label">TESTES</span>
      </button>
    </nav>

    <div id="sb-bottom">
      <div id="conn" class="off">[OFFLINE]</div>
      <div id="fw"></div>
      <button id="logBtn">⏺ LOG</button>
      <button id="logExportBtn" title="Export log for LLM">⇩ EXPORT</button>
    </div>
  </aside>

  <!-- ── Área principal ──────────────────────────────────────────────── -->
  <div id="main-wrap">

    <!-- barra de status superior sempre visível -->
    <div id="statusbar">
      <div id="gauges" class="gauges"></div>
      <div id="injMode" class="inj-mode">—</div>
      <div id="statusLeds" class="leds"></div>
    </div>

    <!-- conteúdo das abas -->
    <main id="content">

      <section id="tab-telemetry" class="pane">
        <div id="scopeWrap">
          <div id="scopeHeader">
            <span id="scopeTitle">OSCILOSCÓPIO CKP / CMP</span>
            <button id="scopeFreezeBtn">⏸ FREEZE</button>
          </div>
          <canvas id="scopeCanvas" height="155"></canvas>
          <div id="scopeInfo">—</div>
        </div>
        <div id="charts" class="charts"></div>
        <div id="diag" class="diag"></div>
      </section>

      <section id="tab-grid-1" class="pane grid-pane active" data-page="1"></section>
      <section id="tab-grid-2" class="pane grid-pane" data-page="2"></section>
      <section id="tab-grid-4" class="pane grid-pane" data-page="4"></section>

      <section id="tab-params" class="pane">
        <div id="paramsRoot"></div>
      </section>

      <section id="tab-boost" class="pane">
        <div id="boostRoot"></div>
      </section>

      <section id="tab-pedal-map" class="pane">
        <div id="pedalMapRoot"></div>
      </section>

      <section id="tab-output-test" class="pane">
        <div id="outputTestRoot"></div>
      </section>

    </main>
  </div>

</div>

<footer id="toast"></footer>

<script src="uplot.min.js"></script>
<script src="app.js?v=20260712e"></script>
</body>
</html>
