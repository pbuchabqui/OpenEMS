; =============================================================================
; OpenEMS — platformio.ini
; Target: Teensy 3.5 (MK64FX512VMD12, Cortex-M4, 120 MHz)
; Framework: Arduino (Teensyduino)
; =============================================================================

[platformio]
default_envs = teensy35

; =============================================================================
; Configurações comuns a todos os environments
; =============================================================================
[common]
build_flags =
    -std=gnu++17
    -O2
    -Wall
    -Wextra
    -Wno-unused-parameter
    -ffunction-sections
    -fdata-sections
    ; Inclui src/ e include/ como raízes de include para paths hal/, drv/, etc.
    -Isrc
    -Iinclude
    ; Define o clock de sistema explicitamente (Teensyduino respeita este valor)
    -DF_CPU=120000000L
    ; Garante que o código de produção não inclua stubs de teste
    -UEMS_HOST_TEST

; =============================================================================
; Target principal — Teensy 3.5
; =============================================================================
[env:teensy35]
platform  = teensy
board     = teensy35
framework = arduino

; CPU explícito: MK64FX512VMD12 (512 KB flash, 192 KB RAM, FPU, QSPI NVM)
board_build.mcu = mk64fx512

; Clock 120 MHz — máximo suportado pelo MK64FX512
board_build.f_cpu = 120000000L

; Otimização: tamanho + velocidade equilibrada
build_flags =
    ${common.build_flags}

; Linker: remover seções não utilizadas
build_unflags =
    -Os

extra_scripts =
    ; Nenhum script customizado necessário no momento

lib_deps =
    ; Nenhuma lib externa — todo o código é proprietário em src/

; Upload via USB (Teensy Loader / PJRC HalfKay)
upload_protocol = teensy-cli

; Monitor serial a 115200 (TunerStudio conecta aqui)
monitor_speed = 115200
monitor_port  = /dev/ttyACM0     ; ajustar para porta real (COMx no Windows)

; =============================================================================
; Environment de testes em host (Linux/macOS/Windows, sem hardware)
; Compila com EMS_HOST_TEST — HAL retorna stubs, sem registradores reais
; =============================================================================
[env:host_test]
platform = native

build_flags =
    -std=gnu++17
    -O0
    -g
    -Wall
    -Wextra
    -Wno-unused-parameter
    -ffunction-sections
    -fdata-sections
    -Isrc
    -Iinclude
    -DEMS_HOST_TEST

; Framework nativo não usa Arduino.h
framework =

lib_deps =

test_framework = unity
test_transport = custom
